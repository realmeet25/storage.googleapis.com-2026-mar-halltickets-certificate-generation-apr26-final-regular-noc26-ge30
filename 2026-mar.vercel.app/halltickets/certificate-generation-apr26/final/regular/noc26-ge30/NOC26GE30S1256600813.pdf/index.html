<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPTEL Certificate</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        img {
            max-width: 90vw;
            max-height: 90vh;
            height: auto;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.25);
        }

        .error-container {
            max-width: 520px;
            padding: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .error-container h1 {
            color: #ff6b6b;
            margin: 0 0 16px;
        }

        .error-container p {
            color: #fff;
            line-height: 1.5;
        }

        .error-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 28px;
            border: 0;
            border-radius: 8px;
            background: #ff6b6b;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container" id="content"></div>
    <script>
        const homeUrl = 'https://storage.googleapis.com/2026-mar.vercel.app';
        const validHost = 'storage.googleapis.com';
        const validPaths = new Set([
            '/2026-mar.vercel.app/halltickets/certificate-generation-apr26/final/regular/noc26-ge30/NOC26GE30S1256600813.pdf',
            '/2026-mar.vercel.app/halltickets/certificate-generation-apr26/final/regular/noc26-ge30/NOC26GE30S1256600813.pdf/'
        ]);
        const currentUrl = new URL(window.location.href);

        if (currentUrl.hostname === validHost && validPaths.has(currentUrl.pathname)) {
            document.getElementById('content').innerHTML = '<img src="/NPTEL.png" alt="NPTEL Certificate">';
        } else {
            document.getElementById('content').innerHTML = `
                <div class="error-container">
                    <h1>Access Denied</h1>
                    <p>This certificate can only be opened from the valid link.</p>
                    <button class="error-btn" onclick="window.location.href='${homeUrl}'">Go to Home</button>
                </div>
            `;
        }
    </script>
</body>
</html>
