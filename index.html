<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Error</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            font-family: Segoe UI, Tahoma, Arial, sans-serif;
            color: #1f2937;
        }

        .popup {
            width: min(480px, calc(100vw - 32px));
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background: #ffffff;
            box-shadow: 0 16px 50px rgba(15, 23, 42, 0.18);
            padding: 22px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 30px;
            color: #fff;
            background: #ef4444;
            font-weight: 700;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 600;
        }

        p {
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
            color: #374151;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
        }

        .button {
            min-width: 88px;
            padding: 8px 14px;
            border-radius: 4px;
            border: 1px solid #2563eb;
            background: #2563eb;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="popup" role="dialog" aria-label="404 error popup">
        <div class="row">
            <div class="icon">!</div>
            <div>
                <h1>404 Error</h1>
                <p>
                    Page not found. You will be redirected to the home page.
                </p>
            </div>
        </div>
        <div class="actions">
            <button class="button" type="button" onclick="window.location.href='https://nptel.ac.in'">Go to Home</button>
        </div>
    </div>
    <script>
        setTimeout(() => {
            window.location.href = 'https://nptel.ac.in';
        }, 4000);
    </script>
</body>
</html>
